# nginx to serve the DeusWatch SPA + reverse-proxy the API.
# /api, /healthz, /readyz are forwarded to the `api` service (docker compose mode),
# so the UI hits the backend without CORS issues. The rest = SPA (history fallback).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve `api` per request via Docker's embedded DNS, so if the api container is
    # recreated (new IP) nginx doesn't keep proxying to a stale address and return 502.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8080;

    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # On-demand AI report generation makes one synchronous LLM call the API caps at 120s
        # (a slow local model over a 7d/30d window is well past nginx's default 60s). Keep the
        # proxy read timeout above that budget so the API's own timeout/JSON error wins instead
        # of nginx returning its 504 HTML page. Applies to all /api calls (cheap ones return fast).
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
    location = /healthz { proxy_pass http://$api_upstream; }
    location = /readyz  { proxy_pass http://$api_upstream; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
