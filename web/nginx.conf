# nginx to serve the DeusWatch SPA + reverse-proxy the API.
# /api, /healthz, /readyz are forwarded to the `api` service (docker compose mode),
# so the UI hits the backend without CORS issues. The rest = SPA (history fallback).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz { proxy_pass http://api:8080; }
    location = /readyz  { proxy_pass http://api:8080; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
