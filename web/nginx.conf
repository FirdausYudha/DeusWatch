# nginx untuk menyajikan SPA DeusWatch + reverse-proxy API.
# /api, /healthz, /readyz diteruskan ke service `api` (mode docker compose),
# sehingga UI menyentuh backend tanpa masalah CORS. Sisanya = SPA (history fallback).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz { proxy_pass http://api:8080; }
    location = /readyz  { proxy_pass http://api:8080; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
