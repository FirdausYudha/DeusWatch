# DeusWatch — docker-compose easy mode: one command to bring up the foundation stack.
#   docker compose -f deploy/docker-compose.yml up --build
#
# Contains: PostgreSQL+TimescaleDB, NATS JetStream, and a hello-world Go service (api)
# that proves connectivity to both via /readyz.
name: deuswatch

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: deuswatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deuswatch_dev}
      POSTGRES_DB: deuswatch
    ports:
      - "${DEUSWATCH_DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deuswatch -d deuswatch"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  nats:
    image: nats:2.10.22-alpine
    # -js: aktifkan JetStream, -sd: direktori penyimpanan, -m: port monitoring (healthz).
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring / healthz
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # Init container: generate the mTLS certificates into ./certs once (idempotent —
  # skipped if ca.crt already exists). api & gateway wait for this to finish.
  certgen:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: certgen
    # Run as root: on Linux the bind-mounted ./certs is host-root-owned, and the image's
    # nonroot user can't write the certs there (Windows ignores mount perms, so it worked).
    user: "0:0"
    # MANAGER_IP (from .env) is added to the server-cert SAN so agents on OTHER machines
    # reach the gateway by the host's LAN IP without a TLS error. Set it before first start.
    command: ["--out", "/certs", "--dns", "localhost,gateway,api", "--ip", "127.0.0.1,::1,${MANAGER_IP:-127.0.0.1}"]
    volumes:
      - ./certs:/certs
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: api
        VERSION: "${DEUSWATCH_VERSION:-dev}"
    # Root so it can read the root-owned 0600 CA key (ca.key) for agent enrollment.
    user: "0:0"
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_ADDR: "db:5432"
      NATS_ADDR: "nats:4222"
      DATABASE_URL: "postgres://deuswatch:${POSTGRES_PASSWORD:-deuswatch_dev}@db:5432/deuswatch?sslmode=disable"
      # The initial admin is seeded when the users table is empty. CHANGE for production.
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-thewatcher}"
      # Self-registration on the login page — off by default (admins add users in the UI).
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-0}"
      # CA for issuing agent certificates during enrollment (mounted read-only).
      CERT_DIR: "/certs"
      # Cross-compiled agent binaries served by the one-line installer. They are baked
      # into the api image (see deploy/Dockerfile), so no host build step is needed.
      AGENT_BIN_DIR: "/agents"
      # Encrypts integration secrets at rest. Generate: openssl rand -base64 32
      SECRETS_KEY: "${SECRETS_KEY:-}"
      # External (host-published) ports agents must reach. The container always listens on
      # 8080/8443 internally; these tell the agent-install wizard which host ports to use so
      # the generated one-liner is correct when you remap the ports below.
      PUBLIC_API_PORT: "${DEUSWATCH_API_PORT:-9080}"
      PUBLIC_GATEWAY_PORT: "${DEUSWATCH_GATEWAY_PORT:-9443}"
    volumes:
      - ./certs:/certs:ro
    ports:
      - "${DEUSWATCH_API_PORT:-9080}:8080"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Ingest gateway (mTLS). Server certificate in ./certs is created by the certgen service.
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: gateway
    # Root so it can read the root-owned 0600 server key (server.key).
    user: "0:0"
    environment:
      GATEWAY_ADDR: ":8443"
      CERT_DIR: "/certs"
      NATS_URL: "nats://nats:4222"
      STORE_DSN: "postgres://deuswatch:${POSTGRES_PASSWORD:-deuswatch_dev}@db:5432/deuswatch?sslmode=disable"
    volumes:
      - ./certs:/certs:ro
    ports:
      - "${DEUSWATCH_GATEWAY_PORT:-9443}:8443"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Detection worker: enrich + Sigma (single-event & aggregation) + response engine.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: worker
    # Reach services on the host (e.g. a local Ollama on :11434) via host.docker.internal,
    # which otherwise does not resolve inside a Linux container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NATS_URL: "nats://nats:4222"
      STORE_DSN: "postgres://deuswatch:${POSTGRES_PASSWORD:-deuswatch_dev}@db:5432/deuswatch?sslmode=disable"
      RULES_DIR: "/rules/sigma"
      # Decrypts integration secrets (CTI keys, MikroTik creds) from the registry.
      SECRETS_KEY: "${SECRETS_KEY:-}"
      # Real CTI enrichment (optional): API keys & GeoIP. The Integrations registry takes
      # precedence over these env vars when configured.
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY:-}"
      OTX_API_KEY: "${OTX_API_KEY:-}"
      GEOIP_ENABLED: "${GEOIP_ENABLED:-0}"
      # Community blocklist (optional): comma-separated IP/CIDR feed URLs.
      BLOCKLIST_URLS: "${BLOCKLIST_URLS:-}"
      # LLM worker (Phase 3): ANTHROPIC_API_KEY -> Claude; LLM_ENABLED=1 -> offline heuristic.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-opus-4-8}"
      LLM_ENABLED: "${LLM_ENABLED:-0}"
      # Response engine (optional): dry-run by default; set RESPONDER + RESPONSE_LIVE=1 for real.
      RESPONDER: "${RESPONDER:-dryrun}"
      RESPONSE_LIVE: "${RESPONSE_LIVE:-0}"
      RESPONSE_AUTO_APPROVE: "${RESPONSE_AUTO_APPROVE:-0}"
      # Notifications (optional): active when any channel is filled in.
      NOTIFY_MIN_SEVERITY: "${NOTIFY_MIN_SEVERITY:-high}"
      NOTIFY_THROTTLE: "${NOTIFY_THROTTLE:-10m}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_TO: "${SMTP_TO:-}"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # Web UI (React+Vite) disajikan nginx; proxy /api ke service api.
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "${DEUSWATCH_WEB_PORT:-9173}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
  nats_data:
