# DeusWatch — docker-compose mode noob: satu perintah untuk menyalakan stack fondasi.
#   docker compose -f deploy/docker-compose.yml up --build
#
# Berisi: PostgreSQL+TimescaleDB, NATS JetStream, dan service Go (api) hello-world
# yang membuktikan konektivitas ke keduanya lewat /readyz.
name: deuswatch

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: deuswatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deuswatch_dev}
      POSTGRES_DB: deuswatch
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deuswatch -d deuswatch"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  nats:
    image: nats:2.10.22-alpine
    # -js: aktifkan JetStream, -sd: direktori penyimpanan, -m: port monitoring (healthz).
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring / healthz
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # Init container: generate sertifikat mTLS ke ./certs sekali (idempotent —
  # dilewati bila ca.crt sudah ada). api & gateway menunggu ini selesai.
  certgen:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: certgen
    command: ["--out", "/certs"]
    volumes:
      - ./certs:/certs
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: api
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_ADDR: "db:5432"
      NATS_ADDR: "nats:4222"
      DATABASE_URL: "postgres://deuswatch:${POSTGRES_PASSWORD:-deuswatch_dev}@db:5432/deuswatch?sslmode=disable"
      # Admin awal di-seed saat tabel users kosong. GANTI untuk produksi.
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-deuswatch-admin}"
      # CA untuk menerbitkan sertifikat agent saat enrollment (mount read-only).
      CERT_DIR: "/certs"
    volumes:
      - ./certs:/certs:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Ingest gateway (mTLS). Sertifikat server di ./certs dibuat service certgen.
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: gateway
    environment:
      GATEWAY_ADDR: ":8443"
      CERT_DIR: "/certs"
      NATS_URL: "nats://nats:4222"
      STORE_DSN: "postgres://deuswatch:${POSTGRES_PASSWORD:-deuswatch_dev}@db:5432/deuswatch?sslmode=disable"
    volumes:
      - ./certs:/certs:ro
    ports:
      - "8443:8443"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Worker deteksi: enrich + Sigma (single-event & agregasi) + response engine.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: worker
    environment:
      NATS_URL: "nats://nats:4222"
      STORE_DSN: "postgres://deuswatch:${POSTGRES_PASSWORD:-deuswatch_dev}@db:5432/deuswatch?sslmode=disable"
      RULES_DIR: "/rules/sigma"
      # Enrichment CTI nyata (opsional): set kunci API & GeoIP.
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY:-}"
      OTX_API_KEY: "${OTX_API_KEY:-}"
      GEOIP_ENABLED: "${GEOIP_ENABLED:-0}"
      # Community blocklist (opsional): URL feed IP/CIDR dipisah koma.
      BLOCKLIST_URLS: "${BLOCKLIST_URLS:-}"
      # Worker LLM (Fase 3): ANTHROPIC_API_KEY -> Claude; LLM_ENABLED=1 -> heuristik.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-opus-4-8}"
      LLM_ENABLED: "${LLM_ENABLED:-0}"
      # Response engine (opsional): dryrun default; set RESPONDER + RESPONSE_LIVE=1 utk nyata.
      RESPONDER: "${RESPONDER:-dryrun}"
      RESPONSE_LIVE: "${RESPONSE_LIVE:-0}"
      RESPONSE_AUTO_APPROVE: "${RESPONSE_AUTO_APPROVE:-0}"
      # Notifikasi (opsional): aktif bila salah satu saluran diisi.
      NOTIFY_MIN_SEVERITY: "${NOTIFY_MIN_SEVERITY:-high}"
      NOTIFY_THROTTLE: "${NOTIFY_THROTTLE:-10m}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_TO: "${SMTP_TO:-}"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # Web UI (React+Vite) disajikan nginx; proxy /api ke service api.
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
  nats_data:
