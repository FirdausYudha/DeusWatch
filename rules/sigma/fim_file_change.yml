title: Monitored File Modified or Deleted (FIM)
id: 2e8b5f31-9c47-4a0d-8b62-3f1d7a9e4c08
status: experimental
description: >
  File Integrity Monitoring detects a monitored file whose content/attributes changed or
  that was deleted. Changes to sensitive config/binary files often indicate tampering or
  track-covering. New file creation (file_created) is intentionally not alerted here to
  reduce noise.
references:
  - https://attack.mitre.org/techniques/T1565/001/
  - https://attack.mitre.org/techniques/T1070/004/
author: DeusWatch
level: medium
logsource:
  product: linux
  category: file_event
detection:
  selection:
    event.category: file
  change:
    event.action:
      - file_modified
      - file_deleted
  condition: selection and change
tags:
  - attack.t1565.001
  - attack.impact
