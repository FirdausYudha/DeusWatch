title: Monitored File Modified or Deleted (FIM)
id: 2e8b5f31-9c47-4a0d-8b62-3f1d7a9e4c08
status: experimental
description: >
  File Integrity Monitoring mendeteksi berkas yang dipantau berubah isi/atribut atau
  dihapus. Perubahan pada berkas konfigurasi/biner sensitif sering menandai tampering
  atau penghapusan jejak. Pembuatan berkas baru (file_created) sengaja tidak di-alert
  di sini untuk mengurangi noise.
references:
  - https://attack.mitre.org/techniques/T1565/001/
  - https://attack.mitre.org/techniques/T1070/004/
author: DeusWatch
level: medium
logsource:
  product: linux
  category: file_event
detection:
  selection:
    event.category: file
  change:
    event.action:
      - file_modified
      - file_deleted
  condition: selection and change
tags:
  - attack.t1565.001
  - attack.impact
