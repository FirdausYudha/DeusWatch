title: SSH Brute Force (aggregation)
id: 9f2c1b04-7a3e-4d51-9c88-2b6f0e1a4d77
status: experimental
description: >
  Banyak kegagalan login SSH dari source IP yang sama dalam jendela singkat —
  indikasi serangan brute force / password guessing. Rule AGREGASI: dijalankan via
  jalur SQL (count() by source.ip) terhadap hypertable events, menggantikan detektor
  brute-force hardcoded dengan rule berformat Sigma (lihat ADR 0001).
references:
  - https://attack.mitre.org/techniques/T1110/
author: DeusWatch
level: high
logsource:
  product: linux
  service: sshd
detection:
  selection:
    event.dataset: sshd
    event.outcome: failure
  timeframe: 1m
  condition: selection | count() by source.ip > 5
tags:
  - attack.t1110
  - attack.credential_access
