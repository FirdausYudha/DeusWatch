title: Windows - Security audit log cleared
id: 500831cb-c82a-4ca6-9a23-cc8e2656f0d8
status: experimental
description: >
  The Windows Security audit log was cleared (Event ID 1102). Wiping the log is a classic
  anti-forensics / defense-evasion step after a compromise. Rarely legitimate outside a
  deliberate, announced maintenance action.
