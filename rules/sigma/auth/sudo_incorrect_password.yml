title: Linux - sudo/su repeated incorrect password
id: 21885ed7-de79-477a-8e3a-1e8d68ca78fa
status: experimental
description: >
  sudo or su recorded incorrect password attempts ("incorrect password attempts", "FAILED su").
  Repeated failures suggest an attacker guessing at privilege escalation from a foothold.
references:
  - https://attack.mitre.org/techniques/T1548/
author: DeusWatch
level: medium
logsource:
  category: authentication
detection:
  keywords:
    - 'incorrect password attempts'
    - 'FAILED su for'
    - 'FAILED SU '
  condition: keywords
tags:
  - attack.t1548
  - attack.privilege_escalation
