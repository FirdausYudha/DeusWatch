title: Failed SSH Login as root
id: a3e8c0f7-5b14-4d62-8e90-1c7a2f6b9d35
status: experimental
description: >
  SSH authentication failure targeting the root account directly — remote root login is
  generally disallowed, so these attempts are suspicious. Example of field matching that
  combines several selections via condition.
author: DeusWatch
level: medium
logsource:
  product: linux
  service: sshd
detection:
  selection:
    event.dataset: sshd
    event.action: ssh_login
    event.outcome: failure
  target_root:
    user.name: root
  condition: selection and target_root
tags:
  - attack.t1110
  - attack.credential_access
