title: FIM - modprobe config (/etc/modprobe.d/)
id: ef668439-d4ac-529f-97b0-105fd1774af2
status: experimental
description: >
  Integrity change on modprobe config (/etc/modprobe.d/). Modification/creation/deletion here often indicates tampering, backdooring, or track-covering.
references:
  - https://attack.mitre.org/techniques/T1565/001/
author: DeusWatch (generated)
level: high
