title: FIM - vsftpd config (/etc/vsftpd.conf)
id: 7f210b44-5970-502e-a054-ffaa1fc09b7a
status: experimental
description: >
  Integrity change on vsftpd config (/etc/vsftpd.conf). Modification/creation/deletion here often indicates tampering, backdooring, or track-covering.
references:
  - https://attack.mitre.org/techniques/T1565/001/
author: DeusWatch (generated)
level: medium
