title: FIM - authorized_keys (/.ssh/authorized_keys)
id: 5e3b261a-3934-592a-8829-8c2c36c0ee99
status: experimental
description: >
  Integrity change on authorized_keys (/.ssh/authorized_keys). Modification/creation/deletion here often indicates tampering, backdooring, or track-covering.
references:
  - https://attack.mitre.org/techniques/T1565/001/
author: DeusWatch (generated)
level: high
logsource:
  product: linux
  category: file_event
detection:
  selection:
    file.path|contains:
      - '/.ssh/authorized_keys'
  change:
    event.action:
      - file_created
      - file_modified
      - file_deleted
  condition: selection and change
tags:
  - attack.t1565.001
  - attack.impact
