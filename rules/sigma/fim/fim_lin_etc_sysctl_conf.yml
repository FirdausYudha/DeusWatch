title: FIM - sysctl config (/etc/sysctl.conf)
id: b035e878-0911-569f-a847-1996ad27dec1
status: experimental
description: >
  Integrity change on sysctl config (/etc/sysctl.conf). Modification/creation/deletion here often indicates tampering, backdooring, or track-covering.
references:
  - https://attack.mitre.org/techniques/T1565/001/
author: DeusWatch (generated)
level: medium
logsource:
  product: linux
  category: file_event
detection:
  selection:
    file.path|contains:
      - '/etc/sysctl.conf'
  change:
    event.action:
      - file_modified
      - file_deleted
  condition: selection and change
tags:
  - attack.t1565.001
  - attack.impact
