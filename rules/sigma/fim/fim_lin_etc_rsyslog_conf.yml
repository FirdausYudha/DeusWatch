title: FIM - rsyslog config (/etc/rsyslog.conf)
id: 790faea9-1df1-57a4-be91-5171f01a1bd7
status: experimental
description: >
  Integrity change on rsyslog config (/etc/rsyslog.conf). Modification/creation/deletion here often indicates tampering, backdooring, or track-covering.
references:
  - https://attack.mitre.org/techniques/T1565/001/
author: DeusWatch (generated)
level: high
logsource:
  product: linux
  category: file_event
detection:
  selection:
    file.path|contains:
      - '/etc/rsyslog.conf'
  change:
    event.action:
      - file_modified
      - file_deleted
  condition: selection and change
tags:
  - attack.t1565.001
  - attack.impact
