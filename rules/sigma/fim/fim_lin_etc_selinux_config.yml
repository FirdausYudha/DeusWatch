title: FIM - SELinux config (/etc/selinux/config)
id: f87010ae-1ca7-5688-8d6a-9faad2c1037d
status: experimental
description: >
  Integrity change on SELinux config (/etc/selinux/config). Modification/creation/deletion here often indicates tampering, backdooring, or track-covering.
references:
  - https://attack.mitre.org/techniques/T1565/001/
author: DeusWatch (generated)
level: high
logsource:
  product: linux
  category: file_event
detection:
  selection:
    file.path|contains:
      - '/etc/selinux/config'
  change:
    event.action:
      - file_modified
      - file_deleted
  condition: selection and change
tags:
  - attack.t1565.001
  - attack.impact
