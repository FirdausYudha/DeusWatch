title: SSH Login Attempt for Invalid User
id: 6b2f4c81-3d9a-4e27-9a1c-7e5b0d83f2a9
status: experimental
description: >
  sshd rejects a login for a user that does not exist on the system ("invalid user") —
  a sign of account enumeration/probing. Single-event (keyword); high volume from a
  single IP is caught by a separate aggregation rule.
references:
  - https://attack.mitre.org/techniques/T1110/003/
author: DeusWatch
level: low
logsource:
  product: linux
  service: sshd
detection:
  keywords:
    - 'invalid user'
  condition: keywords
tags:
  - attack.t1110.003
  - attack.credential_access
