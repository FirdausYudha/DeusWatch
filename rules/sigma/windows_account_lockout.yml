title: Windows Account Lockout (4740)
id: b9d3f6a1-2c84-4e07-9f15-3a6b8c0d2e51
status: experimental
description: >
  A Windows account was locked out (Security event 4740) after too many failed logons - a
  strong, high-signal indicator of an in-progress brute-force / password-guessing attack.
references:
  - https://attack.mitre.org/techniques/T1110/
author: DeusWatch
level: medium
logsource:
  product: windows
  service: security
detection:
  selection:
    event.action: account_locked
  condition: selection
tags:
  - attack.t1110
  - attack.credential_access
