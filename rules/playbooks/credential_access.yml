label: credential_access
name: Credential Access (Windows logon attacks, lockouts)
steps:
  - "Identify the targeted accounts (user.name on the alert) and check for successful logons (EventID 4624) from the attacking IP"
  - "Approve the recommended IP ban on the Response page"
  - "If any logon succeeded: force a password reset and revoke the account's sessions/Kerberos tickets"
  - "Review the source: internal IP = possible lateral movement, investigate that host next"
  - "Consider tightening the account-lockout policy / enabling MFA for exposed accounts"
